<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2592" height="2592" viewBox="0 0 2592 2592">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080d"/>
      <stop offset="50%" style="stop-color:#10101a"/>
      <stop offset="100%" style="stop-color:#0a0a12"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8a8a9a"/>
      <stop offset="40%" style="stop-color:#c0c0d0"/>
      <stop offset="60%" style="stop-color:#d8d8e8"/>
      <stop offset="100%" style="stop-color:#9a9aaa"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="50%" style="stop-color:#C4A265"/>
      <stop offset="100%" style="stop-color:#8B7355"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:transparent;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.5"/>
    </radialGradient>
    <!-- Torch flame glow -->
    <radialGradient id="flameGlow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" style="stop-color:#C4A265;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C4A265;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="flameGlow2" cx="50%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#C4A265;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#C4A265;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="2592" height="2592" fill="url(#bgGrad)"/>
  <rect width="2592" height="2592" fill="url(#vignette)"/>

  <!-- Thin border -->
  <rect x="60" y="60" width="2472" height="2472" rx="6" ry="6"
        fill="none" stroke="url(#silverGrad)" stroke-width="1" opacity="0.2"/>

  <!-- ===== SCENE: Two figures - Judas approaching Jesus ===== -->
  <!-- Centered, large, bold modern line art -->
  <g transform="translate(1296, 480)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Ambient torch glow behind figures -->
    <ellipse cx="-320" cy="-180" rx="180" ry="250" fill="url(#flameGlow)"/>
    <ellipse cx="350" cy="-150" rx="150" ry="220" fill="url(#flameGlow2)"/>

    <!-- === FIGURE LEFT: JUDAS (approaching, leaning forward) === -->
    <g stroke="#c0c0d0" opacity="0.85">
      <!-- Head -->
      <ellipse cx="-180" cy="-260" rx="52" ry="60" stroke-width="5"/>
      <!-- Hair/short lines on head -->
      <path d="M-232,-260 C-235,-290 -220,-310 -200,-315" stroke-width="3" opacity="0.5"/>
      <path d="M-210,-315 C-195,-322 -175,-320 -160,-310" stroke-width="3" opacity="0.5"/>
      <path d="M-155,-305 C-140,-295 -130,-275 -128,-260" stroke-width="3" opacity="0.5"/>

      <!-- Neck -->
      <line x1="-180" y1="-198" x2="-175" y2="-170" stroke-width="4"/>

      <!-- Shoulders - leaning forward -->
      <path d="M-255,-155 C-235,-170 -195,-175 -175,-170 C-155,-165 -120,-160 -95,-145" stroke-width="5"/>

      <!-- Left arm (reaching out toward Jesus) -->
      <path d="M-95,-145 C-65,-130 -30,-115 0,-105" stroke-width="5"/>
      <!-- Hand reaching -->
      <path d="M0,-105 C10,-102 18,-98 22,-90" stroke-width="4"/>
      <path d="M0,-105 C12,-108 22,-105 28,-100" stroke-width="3.5"/>
      <path d="M0,-105 C8,-112 18,-112 25,-110" stroke-width="3"/>

      <!-- Right arm (holding money bag) -->
      <path d="M-255,-155 C-280,-130 -295,-95 -290,-60" stroke-width="5"/>
      <!-- Money bag silhouette -->
      <path d="M-310,-55 C-315,-70 -305,-85 -290,-85 C-275,-85 -265,-70 -270,-55 C-275,-35 -305,-35 -310,-55 Z" stroke-width="4" opacity="0.7"/>
      <!-- Bag tie -->
      <path d="M-295,-85 C-295,-95 -285,-100 -285,-95" stroke-width="3" opacity="0.6"/>

      <!-- Robe/body -->
      <path d="M-255,-155 C-265,-100 -275,-30 -280,60 C-282,120 -270,200 -260,280" stroke-width="4.5" opacity="0.7"/>
      <path d="M-95,-145 C-100,-80 -120,0 -140,80 C-155,150 -150,220 -140,280" stroke-width="4.5" opacity="0.7"/>

      <!-- Robe drape lines -->
      <path d="M-240,-100 C-220,-60 -200,-20 -195,30" stroke-width="2.5" opacity="0.35"/>
      <path d="M-210,-120 C-195,-70 -185,-10 -180,50" stroke-width="2.5" opacity="0.3"/>

      <!-- Feet suggestion -->
      <path d="M-280,280 C-290,295 -295,300 -300,305" stroke-width="3.5" opacity="0.5"/>
      <path d="M-140,280 C-135,295 -125,300 -120,305" stroke-width="3.5" opacity="0.5"/>
    </g>

    <!-- === FIGURE RIGHT: JESUS (standing upright, calm) === -->
    <g stroke="#d8d8e8" opacity="0.9">
      <!-- Head with halo suggestion - thin circle -->
      <ellipse cx="200" cy="-280" rx="50" ry="58" stroke-width="5"/>
      <!-- Subtle halo -->
      <circle cx="200" cy="-285" r="80" stroke-width="1.5" stroke="#C4A265" opacity="0.2"/>

      <!-- Hair - longer, flowing -->
      <path d="M150,-280 C145,-310 155,-340 175,-348" stroke-width="3" opacity="0.5"/>
      <path d="M175,-348 C195,-352 215,-348 230,-340" stroke-width="3" opacity="0.5"/>
      <path d="M230,-340 C248,-325 255,-300 252,-275" stroke-width="3" opacity="0.5"/>
      <!-- Hair falling past shoulders -->
      <path d="M252,-275 C258,-250 260,-225 255,-200" stroke-width="2.5" opacity="0.4"/>
      <path d="M148,-275 C140,-250 138,-225 140,-200" stroke-width="2.5" opacity="0.4"/>

      <!-- Beard suggestion -->
      <path d="M185,-225 C190,-235 200,-240 210,-235" stroke-width="2" opacity="0.35"/>

      <!-- Neck -->
      <line x1="200" y1="-220" x2="200" y2="-190" stroke-width="4"/>

      <!-- Shoulders - level, upright -->
      <path d="M115,-175 C145,-190 175,-192 200,-190 C225,-188 260,-185 290,-170" stroke-width="5"/>

      <!-- Left arm (at side, open palm facing out) -->
      <path d="M115,-175 C95,-145 85,-105 90,-60" stroke-width="5"/>
      <!-- Open hand -->
      <path d="M90,-60 C85,-48 82,-38 84,-28" stroke-width="3.5"/>
      <path d="M90,-60 C95,-48 96,-38 94,-28" stroke-width="3"/>
      <path d="M90,-60 C80,-50 75,-42 74,-32" stroke-width="3"/>

      <!-- Right arm (slightly extended, welcoming/accepting) -->
      <path d="M290,-170 C310,-140 318,-100 310,-55" stroke-width="5"/>
      <!-- Hand -->
      <path d="M310,-55 C312,-42 314,-32 312,-22" stroke-width="3.5"/>
      <path d="M310,-55 C318,-45 322,-35 320,-25" stroke-width="3"/>

      <!-- Robe/body - flowing, vertical -->
      <path d="M115,-175 C105,-110 95,-20 100,80 C105,160 115,230 120,290" stroke-width="4.5" opacity="0.75"/>
      <path d="M290,-170 C295,-100 300,-10 295,80 C290,160 280,230 275,290" stroke-width="4.5" opacity="0.75"/>

      <!-- Robe drape lines (vertical, calm) -->
      <path d="M170,-150 C165,-80 162,0 165,80 C168,150 170,220 172,280" stroke-width="2.5" opacity="0.3"/>
      <path d="M230,-150 C235,-80 237,0 235,80 C233,150 231,220 230,280" stroke-width="2.5" opacity="0.3"/>
      <path d="M200,-170 C198,-90 197,10 198,100 C199,180 200,250 200,290" stroke-width="2" opacity="0.2"/>

      <!-- Feet -->
      <path d="M120,290 C115,305 108,310 105,312" stroke-width="3.5" opacity="0.5"/>
      <path d="M275,290 C280,305 288,310 292,312" stroke-width="3.5" opacity="0.5"/>
    </g>

    <!-- === TORCH LEFT (behind Judas) === -->
    <g opacity="0.6">
      <!-- Torch pole -->
      <line x1="-360" y1="-130" x2="-340" y2="150" stroke="#9a9aaa" stroke-width="5"/>
      <!-- Flame -->
      <path d="M-375,-130 C-380,-170 -365,-210 -355,-230 C-350,-240 -345,-235 -348,-220
               C-345,-230 -338,-245 -335,-230 C-330,-210 -320,-170 -325,-130 Z"
            stroke="#C4A265" stroke-width="3" fill="none"/>
      <!-- Inner flame -->
      <path d="M-365,-135 C-367,-160 -358,-190 -353,-200 C-348,-190 -340,-160 -342,-135"
            stroke="#C4A265" stroke-width="1.5" opacity="0.5" fill="none"/>
    </g>

    <!-- === TORCH RIGHT (background) === -->
    <g opacity="0.45">
      <line x1="400" y1="-100" x2="385" y2="120" stroke="#9a9aaa" stroke-width="4.5"/>
      <!-- Flame -->
      <path d="M385,-100 C380,-135 390,-170 396,-185 C400,-195 405,-190 402,-175
               C406,-185 412,-195 415,-180 C420,-160 425,-130 420,-100 Z"
            stroke="#C4A265" stroke-width="2.5" fill="none"/>
      <!-- Inner flame -->
      <path d="M393,-105 C391,-125 396,-150 400,-160 C404,-150 408,-125 406,-105"
            stroke="#C4A265" stroke-width="1.5" opacity="0.4" fill="none"/>
    </g>

    <!-- === Additional background soldiers (very faint silhouettes) === -->
    <!-- Soldier 1 - far left -->
    <g stroke="#8a8a9a" opacity="0.15" stroke-width="3">
      <ellipse cx="-450" cy="-200" rx="30" ry="35"/>
      <path d="M-480,-165 C-475,-100 -470,-20 -465,60"/>
      <path d="M-420,-165 C-425,-100 -428,-20 -430,60"/>
      <!-- Spear -->
      <line x1="-435" y1="-260" x2="-445" y2="80"/>
    </g>

    <!-- Soldier 2 - far right -->
    <g stroke="#8a8a9a" opacity="0.12" stroke-width="3">
      <ellipse cx="480" cy="-180" rx="28" ry="32"/>
      <path d="M455,-148 C458,-90 460,-10 458,50"/>
      <path d="M505,-148 C502,-90 500,-10 502,50"/>
      <!-- Spear -->
      <line x1="495" y1="-240" x2="488" y2="70"/>
    </g>

    <!-- Soldier 3 - behind Judas -->
    <g stroke="#8a8a9a" opacity="0.1" stroke-width="2.5">
      <ellipse cx="-300" cy="-280" rx="25" ry="28"/>
      <path d="M-325,-252 C-322,-200 -318,-140 -315,-80"/>
      <path d="M-275,-252 C-278,-200 -280,-140 -282,-80"/>
    </g>
  </g>

  <!-- ===== Gold divider ===== -->
  <line x1="946" y1="860" x2="1646" y2="860" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="1296" cy="860" r="3" fill="#C4A265" opacity="0.5"/>

  <!-- ===== TITLE ===== -->
  <text x="1296" y="990" font-family="Georgia, 'Times New Roman', serif" font-size="140"
        fill="url(#silverGrad)" text-anchor="middle" letter-spacing="36" font-weight="400">
    BETRAYAL
  </text>

  <!-- Gold divider below title -->
  <line x1="946" y1="1035" x2="1646" y2="1035" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="1296" cy="1035" r="3" fill="#C4A265" opacity="0.5"/>

  <!-- Reference -->
  <text x="1296" y="1110" font-family="Georgia, 'Times New Roman', serif" font-size="50"
        fill="url(#silverGrad)" text-anchor="middle" letter-spacing="10" opacity="0.55" font-style="italic">
    Matthew 26:14–16
  </text>

  <!-- ===== SCRIPTURE TEXT ===== -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#c0c0d0" text-anchor="middle">

    <!-- Large decorative opening quote -->
    <text x="340" y="1310" font-size="160" fill="#C4A265" opacity="0.2"
          font-family="Georgia, serif" font-weight="700">"</text>

    <text x="1296" y="1320" font-size="52" letter-spacing="1.5" opacity="0.88">
      Then one of the Twelve — the one called
    </text>
    <text x="1296" y="1398" font-size="52" letter-spacing="1.5" opacity="0.88">
      Judas Iscariot — went to the chief priests
    </text>
    <text x="1296" y="1476" font-size="52" letter-spacing="1.5" opacity="0.88">
      and asked,
    </text>

    <!-- Judas's words -->
    <text x="1296" y="1590" font-size="56" letter-spacing="2" font-style="italic" fill="#d8d8e8">
      "What are you willing to give me
    </text>
    <text x="1296" y="1670" font-size="56" letter-spacing="2" font-style="italic" fill="#d8d8e8">
      if I deliver him over to you?"
    </text>

    <text x="1296" y="1785" font-size="52" letter-spacing="1.5" opacity="0.88">
      So they counted out for him
    </text>

    <!-- KEY PHRASE -->
    <text x="1296" y="1880" font-size="66" letter-spacing="5" fill="url(#goldGrad)">
      thirty pieces of silver.
    </text>

    <text x="1296" y="1990" font-size="52" letter-spacing="1.5" opacity="0.88">
      From then on Judas watched for
    </text>
    <text x="1296" y="2068" font-size="52" letter-spacing="1.5" opacity="0.88">
      an opportunity to hand him over.
    </text>

    <!-- Closing quote -->
    <text x="2210" y="2100" font-size="160" fill="#C4A265" opacity="0.2"
          font-family="Georgia, serif" font-weight="700">"</text>
  </g>

  <!-- Bottom cross motif -->
  <g transform="translate(1296, 2320)" stroke="url(#silverGrad)" stroke-width="2" opacity="0.2" fill="none" stroke-linecap="round">
    <line x1="-50" y1="0" x2="-12" y2="0"/>
    <line x1="12" y1="0" x2="50" y2="0"/>
    <line x1="0" y1="-18" x2="0" y2="18"/>
  </g>

</svg>