name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# TODO: Add services.postgres when integration tests requiring real DB are added

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Architecture boundaries
        run: npm run check:architecture

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest run --reporter=verbose
        env:
          AUTH_SECRET: ci-test-secret-32-chars-minimum-x
          DATABASE_URL: ""
          DIRECT_URL: ""

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-test-secret-32-chars-minimum-x
